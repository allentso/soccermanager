function getFiltered(){

    if(currentLeague!=="all" && d.league!==currentLeague) return false;
    if(currentSearch){
      const q=currentSearch.toLowerCase();
      return d.club.toLowerCase().includes(q)||d.stadium.toLowerCase().includes(q)||d.city.toLowerCase().includes(q);
    }
    return true;
  }).sort((a,b)=>{
    let va=a[sortCol], vb=b[sortCol];
    if(typeof va==="string") va=va.toLowerCase(), vb=vb.toLowerCase();
    return sortAsc?(va>vb?1:-1):(va<vb?1:-1);
  });
}

  const tbody=document.getElementById("tbody");

  tbody.innerHTML=rows.map((d,i)=>{
    const lc=leagueColors[d.league]||{bg:"#eee",text:"#333"};
    const barW=Math.round((d.cap/maxCap)*90);
    return `<tr>
      <td class="rank">${i+1}</td>
      <td style="font-weight:500;overflow:hidden;text-overflow:ellipsis">${d.club}</td>
      <td><span class="badge" style="background:${lc.bg};color:${lc.text}">${d.flag}</span></td>
      <td style="overflow:hidden;text-overflow:ellipsis" title="${d.stadium}">${d.stadium}</td>
      <td>
        <div class="cap-bar-wrap">
          <div class="cap-bar" style="width:${barW}px;background:${barColor(d.league)}"></div>
          <span class="cap-text">${d.cap.toLocaleString()}</span>
        </div>
      </td>
      <td style="color:var(--color-text-secondary);overflow:hidden;text-overflow:ellipsis">${d.city}</td>
    </tr>`;
  }).join("");
}

document.getElementById("filters").addEventListener("click",e=>{
  const btn=e.target.closest("button[data-league]");
  if(!btn) return;
  currentLeague=btn.dataset.league;
  document.querySelectorAll("#filters .btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
});

document.getElementById("search").addEventListener("input",e=>{
  currentSearch=e.target.value.trim();
  render();
});

document.querySelectorAll("th.sortable").forEach(th=>{
  th.addEventListener("click",()=>{
    const col=th.dataset.col;
    if(sortCol===col) sortAsc=!sortAsc;
    else{sortCol=col;sortAsc=col==="stadium";}
    document.querySelectorAll("th.sortable").forEach(t=>{
      t.classList.remove("sorted");
      t.querySelector(".sort-icon").className="ti ti-arrows-sort sort-icon";
    });
    th.classList.add("sorted");
    th.querySelector(".sort-icon").className=`ti ${sortAsc?"ti-sort-ascending":"ti-sort-descending"} sort-icon`;
    render();
  });
});

render();
</script>
