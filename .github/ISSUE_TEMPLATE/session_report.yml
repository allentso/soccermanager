name: "\U0001F3AE Session Report"
description: "Share a summary of your play session / Resumen de sesión / Rapport de session / Sitzungsbericht / Relatório de sessão"
labels: ["session-report", "alpha"]
body:
  - type: markdown
    attributes:
      value: |
        ## Session Report
        Session reports are incredibly valuable — they help us understand the full player experience. You can write in your own language!

        ---
        Relatórios de sessão são incrivelmente valiosos! Pode escrever no seu idioma.
        ¡Los reportes de sesión son muy valiosos! Puedes escribir en tu idioma.
        Les rapports de session sont très précieux ! Vous pouvez écrire dans votre langue.
        Sitzungsberichte sind unglaublich wertvoll! Du kannst in deiner Sprache schreiben.

  - type: input
    id: play-time
    attributes:
      label: "Play time / Tiempo de juego / Temps de jeu / Spielzeit / Tempo de jogo"
      description: "How long did you play?"
      placeholder: "About 2 hours"
    validations:
      required: true

  - type: textarea
    id: what-i-did
    attributes:
      label: "What I did / Qué hice / Ce que j'ai fait / Was ich gemacht habe / O que fiz"
      description: "Brief summary of your session."
      placeholder: "Started a new game, played 10 matches, got to matchday 12..."
    validations:
      required: true

  - type: textarea
    id: what-i-enjoyed
    attributes:
      label: "What I enjoyed / Qué disfruté / Ce que j'ai aimé / Was mir gefallen hat / O que gostei"
      description: "What felt good? What kept you playing?"
      placeholder: "The match simulation was exciting, especially when..."
    validations:
      required: true

  - type: textarea
    id: what-frustrated-me
    attributes:
      label: "What frustrated me / Qué me frustró / Ce qui m'a frustré / Was mich frustriert hat / O que me frustrou"
      description: "What almost made you stop? What felt broken or tedious?"
      placeholder: "I got confused by the training page and..."
    validations:
      required: true

  - type: textarea
    id: top-improvements
    attributes:
      label: "Top 3 things I'd improve / 3 cosas que mejoraría / 3 choses à améliorer / 3 Verbesserungen / 3 coisas que melhoraria"
      description: "If you could change three things, what would they be?"
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: dropdown
    id: play-again
    attributes:
      label: "Would you play again? / ¿Jugarías otra vez? / Rejoueriez-vous ? / Würdest du nochmal spielen? / Jogaria novamente?"
      options:
        - "Yes / Sí / Oui / Ja / Sim"
        - "Maybe / Quizás / Peut-être / Vielleicht / Talvez"
        - "No / No / Non / Nein / Não"
    validations:
      required: true

  - type: textarea
    id: play-again-why
    attributes:
      label: "Why? / ¿Por qué? / Pourquoi ? / Warum? / Porquê?"
      description: "Tell us why you would or wouldn't play again."
      placeholder: "Because..."
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: "Anything else? / ¿Algo más? / Autre chose ? / Noch etwas? / Mais alguma coisa?"
      description: "Any other thoughts, screenshots, or log files."
      placeholder: "Drag files here or write anything else..."
    validations:
      required: false
