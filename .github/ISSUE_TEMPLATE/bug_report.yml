name: "\U0001F41B Bug Report"
description: "Report a bug or crash / Reportar un bug / Signaler un bug / Einen Bug melden / Reportar um bug"
labels: ["bug", "alpha"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Thank you for reporting a bug! Please fill in as much detail as you can.
        You can write in your own language — English, Spanish, French, German, Portuguese, or Brazilian Portuguese are all welcome.

        ---
        Obrigado por reportar um bug! Pode escrever no seu idioma.
        ¡Gracias por reportar un bug! Puedes escribir en tu idioma.
        Merci de signaler un bug ! Vous pouvez écrire dans votre langue.
        Danke für das Melden eines Bugs! Du kannst in deiner Sprache schreiben.

  - type: textarea
    id: what-happened
    attributes:
      label: "What happened? / ¿Qué pasó? / Que s'est-il passé ? / Was ist passiert? / O que aconteceu?"
      description: "Describe the bug clearly. / Describe el bug. / Décris le bug. / Beschreibe den Bug. / Descreva o bug."
      placeholder: "The game crashed when I tried to..."
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: "What did you expect? / ¿Qué esperabas? / Qu'attendiez-vous ? / Was hast du erwartet? / O que esperava?"
      description: "What should have happened instead?"
      placeholder: "I expected the match to start normally..."
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: "Steps to reproduce / Pasos para reproducir / Étapes pour reproduire / Schritte zum Reproduzieren / Passos para reproduzir"
      description: "How can we reproduce this bug?"
      placeholder: |
        1. Start a new game
        2. Pick a team
        3. Advance to matchday
        4. Click "Go to the Field"
        5. Game crashes
    validations:
      required: false

  - type: dropdown
    id: frequency
    attributes:
      label: "How often does it happen? / ¿Con qué frecuencia? / À quelle fréquence ? / Wie oft? / Com que frequência?"
      options:
        - Every time / Siempre / À chaque fois / Jedes Mal / Sempre
        - Sometimes / A veces / Parfois / Manchmal / Às vezes
        - Only happened once / Solo una vez / Une seule fois / Nur einmal / Só aconteceu uma vez
    validations:
      required: true

  - type: textarea
    id: game-context
    attributes:
      label: "Game context / Contexto del juego / Contexte de jeu / Spielkontext / Contexto do jogo"
      description: "What day/matchday were you on? What were you doing? Had you just loaded a save?"
      placeholder: "I was on matchday 5, just after a match..."
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: "Operating System"
      description: "e.g., Windows 11, macOS 15, Ubuntu 24.04"
      placeholder: "Windows 11"
    validations:
      required: true

  - type: input
    id: resolution
    attributes:
      label: "Screen resolution"
      description: "e.g., 1920x1080"
      placeholder: "1920x1080"
    validations:
      required: false

  - type: checkboxes
    id: logs
    attributes:
      label: "Log files"
      description: |
        Please attach your log files! They help us fix bugs much faster.
        **Windows:** `C:\Users\<You>\AppData\Roaming\com.sturdyrobot.openfootmanager\logs\`
        **macOS:** `~/Library/Application Support/com.sturdyrobot.openfootmanager/logs/`
        **Linux:** `~/.config/com.sturdyrobot.openfootmanager/logs/`
      options:
        - label: "I have attached my log files (drag & drop the zipped logs folder below)"
          required: false

  - type: textarea
    id: logs-and-screenshots
    attributes:
      label: "Log files & screenshots"
      description: "Drag and drop your zipped logs folder and any screenshots here."
      placeholder: "Drag files here..."
    validations:
      required: false
